name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    services:
      postgres:
        image: postgres:16
        # Match config/test.exs: a goodmao2/goodmao2 role (superuser here, so it has
        # CREATEDB) and the test database the `test` alias creates.
        env:
          POSTGRES_USER: goodmao2
          POSTGRES_PASSWORD: goodmao2
          POSTGRES_DB: goodmao2_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U goodmao2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      # The media purification toolchain (ADR-0005): ffmpeg/ffprobe re-encode images and
      # remux video to strip EXIF/GPS. The suite generates real test clips (needs libx264).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Pin Erlang/Elixir to the versions in .tool-versions.
      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps and _build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      # The esbuild binary lives in _build, so the cache above appears to cover it -- but a
      # cache is only *saved* when its key misses, and this key is mix.lock. The entry was
      # written before the service-worker step existed, so every run since restored a cache
      # with no binary, hit the key exactly, and never re-saved: esbuild was re-downloaded
      # from npm on every build. One 504 from the registry then failed CI (run 30009215295).
      #
      # A separate cache fixes that: it misses once, saves, and hits thereafter. Keyed on
      # config/config.exs rather than the version literal -- `mix esbuild.install --if-missing`
      # keeps whatever binary it finds, so a key that did not change on a version bump would
      # silently build the app with the old esbuild. Hashing the file that declares the version
      # cannot drift from it; the cost is one extra download when any config changes.
      - name: Cache the esbuild binary
        uses: actions/cache@v6
        with:
          path: _build/esbuild-*
          key: ${{ runner.os }}-esbuild-${{ hashFiles('config/config.exs') }}

      - name: Install dependencies
        run: mix deps.get

      - name: Check for unused deps in the lockfile
        run: mix deps.unlock --check-unused

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Dependency advisory audit
        run: mix deps.audit

      - name: Static security scan (Sobelow)
        run: mix sobelow --config

      # priv/static/service_worker.js is a git-ignored esbuild output, so a fresh checkout
      # has no service worker to serve and the PWA test 404s. Only this bundle is needed --
      # the manifest and icons are committed, and no test asserts on the app/CSS bundles.
      - name: Build the service worker bundle
        # On a cache miss this reaches npm, which fails often enough to matter -- a single 504
        # took down an otherwise green build. Retry before giving up so a registry blip does
        # not read as a broken commit.
        run: |
          for attempt in 1 2 3; do
            mix esbuild.install --if-missing && break
            echo "esbuild install failed (attempt $attempt/3); retrying in $((attempt * 5))s"
            sleep $((attempt * 5))
          done
          mix esbuild.install --if-missing
          mix esbuild service_worker

      - name: Run tests
        run: mix test
