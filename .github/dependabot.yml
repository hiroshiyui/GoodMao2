version: 2
updates:
  # Elixir/Hex dependencies. Grouped so related bumps land in one PR to review.
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      hex:
        patterns: ["*"]

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
