<!DOCTYPE html>
<!--
  The one page the service worker precaches, shown when a navigation fails offline.

  It is deliberately a plain static file rather than a rendered template: it must work with
  no server, no digested assets and no session, so it carries its own styles and cannot go
  through Gettext. All three supported locales are shown together instead.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · GoodMao</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem calc(1.5rem + env(safe-area-inset-left)) 2rem
          calc(1.5rem + env(safe-area-inset-right));
        background: #fdf6ef;
        color: #4a3b33;
        font-family: ui-sans-serif, system-ui, -apple-system, "Noto Sans TC", "Noto Sans JP",
          sans-serif;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        color: #b5482b;
      }
      p {
        margin: 0 0 0.5rem;
        line-height: 1.6;
      }
      p:lang(zh-Hant),
      p:lang(ja) {
        color: #6b5a50;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.4rem;
        font: inherit;
        color: #fdf6ef;
        background: #b5482b;
        border: 0;
        border-radius: 9999px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GoodMao</h1>
      <p lang="en">You're offline. Your pet's records need a connection — reconnect and try again.</p>
      <p lang="zh-Hant">目前沒有網路連線。毛孩的紀錄需要連線才能讀取，請恢復連線後再試一次。</p>
      <p lang="ja">オフラインです。ペットの記録を見るには接続が必要です。再接続してからお試しください。</p>
      <button type="button" onclick="location.reload()">Retry · 重試 · 再試行</button>
    </main>
  </body>
</html>
