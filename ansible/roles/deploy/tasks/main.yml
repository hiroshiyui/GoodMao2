---
# GoodMao2 — Deploy role
#
# Builds GoodMao2 from a git release tag, creates an OTP release, manages
# symlink-based releases, runs migrations, and restarts the service.

# ============================================================
# Phase 1: Pre-flight checks
# ============================================================

- name: Verify goodmao user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ goodmao_user }}"
  register: goodmao_user_check

- name: Verify asdf is installed
  ansible.builtin.stat:
    path: "{{ goodmao_home }}/.asdf/bin/asdf"
  register: asdf_check

- name: Fail if asdf is not installed
  ansible.builtin.assert:
    that:
      - asdf_check.stat.exists
    fail_msg: >
      asdf is not installed for {{ goodmao_user }}.
      Run setup-server.yml first to provision the server.

- name: Check for currently deployed release
  ansible.builtin.stat:
    path: "{{ deploy_path }}/current"
  register: current_release

- name: Read current release tag
  when: current_release.stat.exists
  block:
    - name: Check for deployed tag file
      ansible.builtin.stat:
        path: "{{ deploy_path }}/current/.release_tag"
      register: tag_file

    - name: Read deployed tag
      when: tag_file.stat.exists
      ansible.builtin.slurp:
        src: "{{ deploy_path }}/current/.release_tag"
      register: deployed_tag_raw

    - name: Set deployed tag fact
      when: tag_file.stat.exists
      ansible.builtin.set_fact:
        deployed_tag: "{{ deployed_tag_raw.content | b64decode | trim }}"

    - name: Warn if deploying older version
      when:
        - deployed_tag is defined
        - (release_tag | regex_replace('^v', '')) is version((deployed_tag | regex_replace('^v', '')), '<')
      block:
        - name: Display version warning
          ansible.builtin.debug:
            msg: |
              ============================================================
              WARNING: You are deploying {{ release_tag }} which is OLDER
              than the currently deployed {{ deployed_tag }}.
              ============================================================

        - name: Confirm rollback
          ansible.builtin.pause:
            prompt: "Press Enter to continue with rollback, or Ctrl+C to abort"

# ============================================================
# Phase 2: Create directory structure
# ============================================================

- name: Create deployment directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ deploy_path }}/releases"
    # Persistent, backed-up media store (MEDIA_STORAGE_DIR) — survives releases.
    - "{{ media_path }}"
    - "{{ deploy_path }}/env"

- name: Restrict env directory permissions
  ansible.builtin.file:
    path: "{{ deploy_path }}/env"
    mode: "0700"

# ============================================================
# Phase 3: Source checkout
# ============================================================

- name: Set release timestamp
  ansible.builtin.set_fact:
    release_timestamp: "{{ ansible_facts.date_time.date | replace('-', '') }}_{{ ansible_facts.date_time.time | replace(':', '') }}"

- name: Clone or update source repository
  ansible.builtin.git:
    repo: "{{ git_repo }}"
    dest: "{{ deploy_path }}/src"
    version: "{{ release_tag }}"
    force: true

# ============================================================
# Phase 4: Build OTP release
# ============================================================

- name: Install mix dependencies (prod only)
  ansible.builtin.command:
    cmd: "{{ goodmao_home }}/.asdf/bin/asdf exec mix deps.get --only prod"
    chdir: "{{ deploy_path }}/src"
  environment:
    ASDF_DATA_DIR: "{{ goodmao_home }}/.asdf"
    PATH: "{{ goodmao_home }}/.asdf/bin:{{ goodmao_home }}/.asdf/shims:{{ ansible_facts.env.PATH }}"
    CARGO_HOME: "{{ goodmao_home }}/.cargo"
    RUSTUP_HOME: "{{ goodmao_home }}/.rustup"
    MIX_ENV: prod
  changed_when: true

- name: Compile application
  ansible.builtin.command:
    cmd: "{{ goodmao_home }}/.asdf/bin/asdf exec mix compile"
    chdir: "{{ deploy_path }}/src"
  environment:
    ASDF_DATA_DIR: "{{ goodmao_home }}/.asdf"
    # .cargo/bin on PATH so the Rustler NIF (native/goodmao2_native) builds.
    PATH: "{{ goodmao_home }}/.asdf/bin:{{ goodmao_home }}/.asdf/shims:{{ goodmao_home }}/.cargo/bin:{{ ansible_facts.env.PATH }}"
    CARGO_HOME: "{{ goodmao_home }}/.cargo"
    RUSTUP_HOME: "{{ goodmao_home }}/.rustup"
    MIX_ENV: prod
  changed_when: true

- name: Deploy assets
  ansible.builtin.command:
    cmd: "{{ goodmao_home }}/.asdf/bin/asdf exec mix assets.deploy"
    chdir: "{{ deploy_path }}/src"
  environment:
    ASDF_DATA_DIR: "{{ goodmao_home }}/.asdf"
    PATH: "{{ goodmao_home }}/.asdf/bin:{{ goodmao_home }}/.asdf/shims:{{ ansible_facts.env.PATH }}"
    MIX_ENV: prod
  changed_when: true

- name: Remove stale release directory from previous builds
  ansible.builtin.file:
    path: "{{ deploy_path }}/src/_build/prod/rel"
    state: absent

- name: Build OTP release
  ansible.builtin.command:
    cmd: "{{ goodmao_home }}/.asdf/bin/asdf exec mix release --overwrite"
    chdir: "{{ deploy_path }}/src"
  environment:
    ASDF_DATA_DIR: "{{ goodmao_home }}/.asdf"
    PATH: "{{ goodmao_home }}/.asdf/bin:{{ goodmao_home }}/.asdf/shims:{{ ansible_facts.env.PATH }}"
    MIX_ENV: prod
  changed_when: true

# ============================================================
# Phase 5: Install release
# ============================================================
# Note: unlike an uploads-on-disk app, GoodMao2 stores media under
# MEDIA_STORAGE_DIR ({{ media_path }}) and serves it through the app
# (authorized per request), so there is nothing to symlink into priv/static.

- name: Copy release to timestamped directory
  ansible.builtin.copy:
    src: "{{ deploy_path }}/src/_build/prod/rel/goodmao2/"
    dest: "{{ deploy_path }}/releases/{{ release_timestamp }}"
    remote_src: true
    mode: preserve

- name: Write release tag file
  ansible.builtin.copy:
    content: "{{ release_tag }}"
    dest: "{{ deploy_path }}/releases/{{ release_timestamp }}/.release_tag"
    mode: "0644"

# ============================================================
# Phase 6: Environment file
# ============================================================

- name: Deploy environment file
  ansible.builtin.template:
    src: goodmao2.env.j2
    dest: "{{ deploy_path }}/env/goodmao2.env"
    mode: "0600"
  no_log: true
  notify: Restart goodmao2

# ============================================================
# Phase 7: Systemd service
# ============================================================

- name: Deploy systemd service unit
  become_user: root
  ansible.builtin.template:
    src: goodmao2.service.j2
    dest: /etc/systemd/system/goodmao2.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart goodmao2

- name: Enable goodmao2 service
  become_user: root
  ansible.builtin.systemd:
    name: goodmao2
    enabled: true

# ============================================================
# Phase 8: Database migration (BEFORE symlink swap)
# ============================================================
# Migrations run from the NEW release directory (not "current") so the DB is
# ready before the app restarts. `bin/migrate` boots the release via `eval`,
# which evaluates config/runtime.exs in full — and GoodMao2's prod block fails
# fast on missing DATABASE_URL / SECRET_KEY_BASE / MEDIA_STORAGE_DIR / AWS_SES_*
# / MAILER_FROM_EMAIL. Sourcing the just-written env file guarantees the migrate
# environment matches the running app's exactly (and keeps secrets out of argv).

- name: Run database migrations
  ansible.builtin.shell:
    cmd: >
      set -a && . {{ deploy_path }}/env/goodmao2.env && set +a &&
      {{ deploy_path }}/releases/{{ release_timestamp }}/bin/migrate
    executable: /bin/bash
  no_log: true
  register: migration_result
  changed_when: "'already up' not in migration_result.stdout"

# ============================================================
# Phase 9: Activate release (atomic symlink swap)
# ============================================================

- name: Activate release — update current symlink
  ansible.builtin.file:
    src: "{{ deploy_path }}/releases/{{ release_timestamp }}"
    dest: "{{ deploy_path }}/current"
    state: link
    force: true
  notify: Restart goodmao2

- name: Find priv/static path in active release
  ansible.builtin.shell:
    cmd: "readlink -f {{ deploy_path }}/releases/{{ release_timestamp }}/lib/goodmao2-*/priv/static | tail -1"
  register: static_path_result
  changed_when: false

- name: Update static symlink
  ansible.builtin.file:
    src: "{{ static_path_result.stdout | trim }}"
    dest: "{{ deploy_path }}/static"
    state: link
    force: true

# ============================================================
# Phase 10: Restart and health check
# ============================================================

- name: Flush handlers to restart service
  ansible.builtin.meta: flush_handlers

- name: Wait for application to become healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}/health"
    method: GET
    status_code: 200
  register: health_check
  until: health_check.status == 200
  retries: 30
  delay: 2

# ============================================================
# Phase 11: Cleanup old releases
# ============================================================

- name: List all releases
  ansible.builtin.find:
    paths: "{{ deploy_path }}/releases"
    file_type: directory
    recurse: false
  register: all_releases

- name: Remove old releases (keep {{ keep_releases }} most recent)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ (all_releases.files | sort(attribute='path') | reverse | list)[keep_releases:] }}"
  when: all_releases.files | length > keep_releases
