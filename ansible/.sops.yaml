# SOPS configuration — defines which keys encrypt which files.
#
# Replace the fingerprint below with your GPG key:
#   gpg --list-keys --keyid-format long
#
# For multiple operators, list all fingerprints comma-separated. If you already
# operate the sibling Baudrate deploy, reuse the same GPG key here.
creation_rules:
  - path_regex: \.sops\.yml$
    pgp: "REPLACE_WITH_YOUR_GPG_FINGERPRINT"
